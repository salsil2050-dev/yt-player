<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Stream | Cinematic 21:9</title>
    <style>
        /* --- DARK NEON THEME --- */
        body {
            background: #0f0c29;
            background: linear-gradient(135deg, #050505 0%, #0f0c29 50%, #1a1a2e 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 2.8rem; 
            letter-spacing: 4px; 
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #ff00c1;
            margin: 10px 0;
        }

        /* --- SEARCH BOX --- */
        .search-container {
            display: flex; justify-content: center; gap: 12px;
            max-width: 700px; margin: 0 auto 50px auto;
        }
        input#searchInput {
            flex: 1; background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            padding: 15px 25px; border-radius: 40px;
            color: white; outline: none; transition: 0.4s;
            font-size: 16px;
        }
        input#searchInput:focus { 
            border-color: #00d4ff; 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }
        
        button#searchBtn {
            background: linear-gradient(45deg, #ff00c1, #00d4ff);
            border: none; padding: 0 30px;
            border-radius: 40px; color: white; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button#searchBtn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- RESULTS GRID --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px; padding-bottom: 50px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { 
            transform: translateY(-12px) scale(1.02); 
            border-color: #00d4ff;
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.2);
        }
        .card img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
        .card-info { padding: 20px; font-size: 15px; font-weight: 500; }

        /* --- CINEMATIC GLASS POPUP --- */
        .popup-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px); z-index: 2000;
            animation: fadeIn 0.4s ease;
        }

        .popup-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; max-width: 1000px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.8);
            animation: cinematicSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Cinematic 21:9 Video Box */
        .video-box {
            width: 100%; aspect-ratio: 21 / 9;
            background: #000; border-radius: 18px;
            overflow: hidden; 
            border: 2px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
            position: relative;
        }
        iframe { 
            width: 100%; height: 100%; border: none; 
            object-fit: cover; transform: scale(1.03); /* Zoom to fill 21:9 box */
        }

        .close-btn {
            position: absolute; top: -50px; right: 10px;
            color: #ff00c1; font-size: 32px;
            cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .close-btn:hover { transform: rotate(90deg); color: #fff; }

        #videoTitle {
            margin: 20px 0 10px 10px; color: #00d4ff;
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes cinematicSlide { 
            from { opacity: 0; transform: translate(-50%, -40%) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEON<span style="color:#00d4ff">STREAM</span></h1>
        <p style="opacity: 0.6; font-size: 0.9rem;">ULTRA-WIDE CINEMATIC PLAYER</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for movies, music, or videos...">
        <button id="searchBtn" onclick="searchYouTube()">SEARCH</button>
    </div>

    <div id="resultsGrid" class="results-grid">
        <!-- Results will be injected here -->
    </div>

    <!-- Popup Player -->
    <div id="videoPopup" class="popup-overlay" onclick="closePlayer()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePlayer()">✕</div>
            <div class="video-box">
                <iframe id="ytPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <h3 id="videoTitle"></h3>
        </div>
    </div>

    <script>
        // ENTER YOUR KEY HERE
        const API_KEY = "AIzaSyDlIL4kUKGv3hDEXRzqbGQHGSisFvBAjh0"; 

        async function searchYouTube() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const url = `https://www.googleapis.com{encodeURIComponent(query)}&key=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    alert("Error: " + data.error.message);
                    return;
                }
                renderResults(data.items);
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function renderResults(items) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = items.map(item => `
                <div class="card" onclick="openPlayer('${item.id.videoId}', '${item.snippet.title.replace(/'/g, "&apos;")}')">
                    <img src="${item.snippet.thumbnails.high.url}" alt="thumbnail">
                    <div class="card-info">${item.snippet.title}</div>
                </div>
            `).join('');
        }

        function openPlayer(id, title) {
            const player = document.getElementById('ytPlayer');
            const popup = document.getElementById('videoPopup');
            
            // Cinematic parameters: modestbranding, rel, iv_load_policy
            player.src = `https://www.youtube.com{id}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
            document.getElementById('videoTitle').innerText = title;
            popup.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function closePlayer() {
            const popup = document.getElementById('videoPopup');
            const player = document.getElementById('ytPlayer');
            
            popup.style.display = 'none';
            player.src = ""; // Kill video stream
            document.body.style.overflow = 'auto'; // Re-enable scroll
        }

        // Search on Enter Key
        document.getElementById("searchInput").addEventListener("keyup", (e) => {
            if (e.key === "Enter") searchYouTube();
        });
    </script>
</body>
</html>
