<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream || Cinematic</title>
    <style>
        /* --- DARK CINEMATIC THEME --- */
        body {
            background: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; letter-spacing: 3px; text-shadow: 0 0 15px #00d4ff; }

        /* --- LOCAL FILE CONTROLS --- */
        .controls {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            max-width: 600px; margin: 0 auto 40px auto;
        }

        input[type="file"] { display: none; }
        .upload-btn {
            background: linear-gradient(45deg, #ff00c1, #00d4ff);
            padding: 15px 35px; border-radius: 40px;
            cursor: pointer; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(255, 0, 193, 0.4);
            transition: 0.3s;
        }
        .upload-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- RESULTS GRID --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer; transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); border-color: #00d4ff; }
        .thumbnail-box {
            width: 100%; aspect-ratio: 16 / 9;
            background: #111; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: #333;
        }
        .card-info { padding: 15px; font-size: 14px; text-transform: uppercase; }

        /* --- CINEMATIC 21:9 POPUP --- */
        .popup-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px); z-index: 2000;
        }

        .popup-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; max-width: 1100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
        }

        .video-box {
            width: 100%; aspect-ratio: 21 / 9; /* Cinematic Ratio */
            background: #000; border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .close-btn {
            position: absolute; top: -50px; right: 0;
            color: #ff00c1; font-size: 35px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEON<span style="color:#00d4ff">STREAM</span></h1>
        <p style="opacity: 0.5;">FAVOURITES</p>
    </div>

    <div class="controls">
        <label class="upload-btn" for="videoInput">SELECT VIDEOS</label>
        <input type="file" id="videoInput" accept="video/*" multiple>
    </div>

    <div id="resultsGrid" class="results-grid"></div>

    <!-- Popup Player -->
    <div id="videoPopup" class="popup-overlay" onclick="closePlayer()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePlayer()">✕</div>
            <div class="video-box">
                <video id="localPlayer" controls></video>
            </div>
            <h3 id="videoTitle" style="margin-top: 15px; color: #00d4ff; padding: 0 10px;"></h3>
        </div>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const videoPopup = document.getElementById('videoPopup');
        const localPlayer = document.getElementById('localPlayer');
        const videoTitle = document.getElementById('videoTitle');

        // Handle Multiple Local Files
        videoInput.addEventListener('change', function(e) {
            resultsGrid.innerHTML = '';
            const files = Array.from(e.target.files);

            files.forEach(file => {
                const fileURL = URL.createObjectURL(file); // Temporary Browser URL
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="thumbnail-box">🎬</div>
                    <div class="card-info"><strong>${file.name}</strong></div>
                `;
                
                card.onclick = () => openPlayer(fileURL, file.name);
                resultsGrid.appendChild(card);
            });
        });

        function openPlayer(url, name) {
            localPlayer.src = url;
            videoTitle.innerText = name;
            videoPopup.style.display = 'block';
            localPlayer.play();
        }

        function closePlayer() {
            videoPopup.style.display = 'none';
            localPlayer.pause();
            localPlayer.src = "";
        }
    </script>
</body>
</html>
