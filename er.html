<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Search & Player</title>
  <!-- Load YouTube API -->
  <script src="https://www.youtube.com/iframe_api"></script>
<style>
    body { font-family: Arial, sans-serif; background-color: #f1f1f1; margin: 0; padding: 0; }
    .container { max-width: 800px; margin: 20px auto; padding: 15px; background-color: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); height: 75vh; overflow-y: scroll; }
    .search-bar { display: flex; margin-bottom: 20px; position: sticky; top: 0; background: white; padding: 5px; z-index: 5; }
    .search-bar input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; }
    .search-bar button { padding: 10px 15px; background-color: #4CAF50; color: #fff; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
    .result-item { display: flex; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; align-items: center; }
    .result-item img { width: 120px; height: 80px; margin-right: 10px; border-radius: 5px; object-fit: cover; }
    .result-item .info p { margin: 0; font-size: 14px; font-weight: bold; }

    /* MOBILE DEBUG BOX */
    #mobile-console { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: #222; color: #0f0; font-size: 10px; overflow-y: auto; padding: 5px; z-index: 2000; border-top: 2px solid red; font-family: monospace; pointer-events: none; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; display: none; backdrop-filter: blur(2px); }
    .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 1000; }
    .popup-content { width: 95%; max-width: 1000px; background-color: #000; padding: 5px; border-radius: 10px; position: relative; }

    /* 21:9 CINEMATIC PLAYER */
    #player-wrapper { position: relative; width: 100%; aspect-ratio: 21 / 9; background: #000; border-radius: 5px; overflow: hidden; }
    #player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    .video-end { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; z-index: 10; color: white; display: none; align-items: center; justify-content: center; }
    .close-btn { position: absolute; bottom: -40px; left: 10px; width: 60px; height: 60px; border-radius: 50%; background-color: #fff; border: 4px solid black; cursor: pointer; font-size: 12px; font-weight: bold; }
    .tx { position: absolute; bottom: -45px; left: 80px; font-size: 20px; font-weight: bold; color: #fff; background-color: red; padding: 5px; border-radius: 5px; }
</style>
</head>
<body>

  <div class="container" id="scroll-container">
    <h1>MyTube Mobile</h1>
    <div class="search-bar">
      <input id="search-query" type="text" placeholder="Search YouTube">
      <button id="search-btn">Search</button>
    </div>
    <div class="results" id="results"></div>
  </div>

  <!-- Mobile Console Overlay -->
  <div id="mobile-console">DEBUG LOG: System Ready...<br></div>

  <div class="overlay" onclick="closePopup()"></div>
  <div class="popup" id="popup">
    <div class="popup-content">
      <div id="player-wrapper">
        <div id="youtube-player"></div>
        <div class="video-end" id="end-msg">10 SECONDS LEFT</div>
      </div>
      <button class="close-btn" onclick="closePopup()">CLOSE</button>
      <span class="tx">KrishaS Player</span>
    </div>
  </div>

  <script>
    let query = '';
    let nextPageToken = '';
    let fetching = false;
    let player;
    
    // YOUR API KEY (Check this starts with AIza...)
    const API_KEY = 'AIzaSyDEHueKMyNMeMDl1gHIthaYJO3Wc5502Rk'; 

    function mobileLog(msg) {
        const logBox = document.getElementById('mobile-console');
        logBox.innerHTML += "> " + msg + "<br>";
        logBox.scrollTop = logBox.scrollHeight;
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      query = document.getElementById('search-query').value;
      nextPageToken = '';
      document.getElementById('results').innerHTML = '';
      mobileLog("Searching for: " + query);
      fetchResults(query);
    });

    document.getElementById('scroll-container').addEventListener('scroll', function() {
      if (this.scrollHeight - this.scrollTop <= this.clientHeight + 10 && !fetching && query) {
        mobileLog("Loading more results...");
        fetchResults(query);
      }
    });

    function fetchResults(query) {
      fetching = true;
      const apiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${API_KEY}&type=video&maxResults=5&pageToken=${nextPageToken}`;
      fetch(apiUrl)
        .then(response => {
          mobileLog("API Response Code: " + response.status);
          return response.json();
        })
        .then(data => {
          if (data.error) {
              mobileLog("API ERROR: " + data.error.message);
              return;
          }
          appendResults(data);
          nextPageToken = data.nextPageToken || '';
          fetching = false;
        })
        .catch(error => {
          mobileLog("Fetch Crash: " + error.message);
          fetching = false;
        });
    }

    function appendResults(data) {
      const resultsDiv = document.getElementById('results');
      data.items.forEach(item => {
        const videoId = item.id.videoId;
        const title = item.snippet.title;
        const thumbnail = item.snippet.thumbnails.medium.url;
        resultsDiv.innerHTML += `
          <div class="result-item" onclick="playVideo('${videoId}')">
            <img src="${thumbnail}">
            <div class="info"><p>${title}</p></div>
          </div>
        `;
      });
    }

    function playVideo(videoId) {
      mobileLog("Opening video: " + videoId);
      document.querySelector('.overlay').style.display = 'block';
      document.getElementById('popup').style.display = 'flex';
      document.getElementById('end-msg').style.display = 'none';

      if (player) {
          player.loadVideoById(videoId);
      } else {
          player = new YT.Player('youtube-player', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: { 'autoplay': 1, 'rel': 0, 'enablejsapi': 1, 'mute': 1 },
            events: {
              'onReady': (e) => { mobileLog("Player Ready"); e.target.playVideo(); },
              'onStateChange': (e) => {
                if (e.data == YT.PlayerState.PLAYING) checkTime();
              }
            }
          });
      }
    }

    function checkTime() {
      const checkInt = setInterval(() => {
        if (!player || document.getElementById('popup').style.display === 'none') {
            clearInterval(checkInt);
            return;
        }
        const timeLeft = player.getDuration() - player.getCurrentTime();
        if (timeLeft <= 10 && timeLeft > 0) {
          document.getElementById('end-msg').style.display = 'flex';
          clearInterval(checkInt);
        }
      }, 1000);
    }

    function closePopup() {
      mobileLog("Closing player");
      document.querySelector('.overlay').style.display = 'none';
      document.getElementById('popup').style.display = 'none';
      if(player) player.stopVideo();
    }
  </script>
</body>
</html>
